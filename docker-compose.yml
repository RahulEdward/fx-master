version: "3.9"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: fxmaster-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fxmaster
      POSTGRES_PASSWORD: fxmaster_pass
      POSTGRES_DB: fxmaster_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fxmaster -d fxmaster_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Cache & PubSub
  redis:
    image: redis:7-alpine
    container_name: fxmaster-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
